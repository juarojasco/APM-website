<!DOCTYPE html>
<html>
<head>
<title>Módulo 2 - Gestión</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="navbar">
    <div class="logo">
        <img src="source/logo.png">
    </div>
</div>

<div class="section">

    <div class="title-badge">MÓDULO 2</div>

    <h2 class="subtitle-proyecto">
        Gestión de Producción
    </h2>

</div>

<!-- GRAFICOS -->
<div class="section gray">

    <div class="grid-graficos">

        <div class="card-grafico">
            <div class="grafico-header">DOP</div>
            <div class="grafico-img">
                <img src="source/dop.png">
            </div>
        </div>

        <div class="card-grafico">
            <div class="grafico-header">DAP</div>
            <div class="grafico-img">
                <img src="source/dap.png">
            </div>
        </div>

        <div class="card-grafico">
            <div class="grafico-header">Layout</div>
            <div class="grafico-img">
                <img src="source/layout.png">
            </div>
        </div>

        <div class="card-grafico">
            <div class="grafico-header">Flujo</div>
            <div class="grafico-img">
                <img src="source/flujomaterial.jpeg">
            </div>
        </div>

    </div>

</div>

<!-- INDICADORES -->
<div class="section indicadores">

    <h2>Indicadores</h2>

    <div class="grid-indicadores">

        <div class="indicador">
            <h3>OEE</h3>
            <span>70%</span>
            <p>Eficiencia global</p>
        </div>

        <div class="indicador">
            <h3>A</h3>
            <span>76%</span>
            <p>Disponibilidad</p>
        </div>

    </div>

</div>

</body>
</html>
